    user-select: none; -webkit-user-drag: none; pointer-events: none;

  canvas.layer {

  // ---------- Photo sampler ----------
  const photo = document.getElementById('bgimg');
  const sampler = document.createElement('canvas');
  const sctx = sampler.getContext('2d', { willReadFrequently: true });
  let photoReady = false, photoData = null, photoW = 0, photoH = 0;
  let coverScale = 1, coverDX = 0, coverDY = 0;

  function buildSampler(){
    if (!photo.naturalWidth) return;
    const targetW = 640;
    const ratio = photo.naturalHeight / photo.naturalWidth;
    sampler.width  = targetW;
    sampler.height = Math.round(targetW * ratio);
    sctx.filter = 'blur(' + PHOTO_BLUR_PX + 'px)';
    sctx.drawImage(photo, 0, 0, sampler.width, sampler.height);
    sctx.filter = 'none';
    try {
      photoData = sctx.getImageData(0, 0, sampler.width, sampler.height).data;
      photoW = sampler.width;
      photoH = sampler.height;
      photoReady = true;
    } catch(e) { photoReady = false; }
    updateCoverMapping();
  }
  function updateCoverMapping(){
    if (!photo.naturalWidth) return;
    const iw = photo.naturalWidth, ih = photo.naturalHeight;
    const cw = innerWidth, ch = innerHeight;
    coverScale = Math.max(cw/iw, ch/ih);
    const dw = iw * coverScale, dh = ih * coverScale;
    coverDX = (cw - dw) * 0.5;
    coverDY = (ch - dh) * 0.5;
  }
  if (photo.complete && photo.naturalWidth) buildSampler();
  else photo.addEventListener('load', buildSampler);

  function samplePhoto(sx, sy){
    if (!photoReady) return [200, 210, 225];
    const nx = (sx - coverDX) / coverScale;
    const ny = (sy - coverDY) / coverScale;
    const tx = (nx / photo.naturalWidth) * photoW;
    const ty = (ny / photo.naturalHeight) * photoH;
    const ix = Math.max(0, Math.min(photoW-1, tx | 0));
    const iy = Math.max(0, Math.min(photoH-1, ty | 0));
    const idx = (iy * photoW + ix) * 4;
    let r = photoData[idx], g = photoData[idx+1], b = photoData[idx+2];
    r = Math.min(255, r + 255*PHOTO_LIGHT_BIAS);
    g = Math.min(255, g + 255*PHOTO_LIGHT_BIAS);
    b = Math.min(255, b + 255*PHOTO_LIGHT_BIAS);
    const lum = 0.2126*r + 0.7152*g + 0.0722*b;
    r = lum + (r - lum) * PHOTO_SAT_BOOST;
    g = lum + (g - lum) * PHOTO_SAT_BOOST;
    b = lum + (b - lum) * PHOTO_SAT_BOOST;
    return [r|0, g|0, b|0];
  }

    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    const f = 520 + Math.random()*420;
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(120, f*0.55), t+0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(PLINK_VOL, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.32);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t+0.36);
  }

    for (let r=0; r<ROWS; r++) rowY.push(topY + (r+1) * rowGap);

    binCount = ROWS + 1;

  // Bins are a FIXED viewport-spanning spatial grid. The Galton lattice and spout drift
  // around freely on top of them; bins themselves never move so the pile is never
  // spatially destroyed when the spout sweeps horizontally.
  function rebuildBins(){
    const cellsAcross = Math.max(8, Math.ceil(innerWidth / pitch) + 4);
    binStartX = -pitch; // start a cell to the left of the viewport so edge x=0 is covered
    if (!bins.length || bins.length !== cellsAcross){
      bins = [];
      for (let i=0; i<cellsAcross; i++){
        const x0 = binStartX + i*pitch;
        bins.push({ x0, x1: x0 + pitch, glyphs: [], topY: binBaseY });
      }
    }

    // grid is permanent and glyphs stored in them remain spatially correct.
  }
  // Spatial lookup — index of the bin that owns this absolute viewport x.
  function binIndexFor(x){
    const idx = Math.floor((x - bins[0].x0) / pitch);
    return Math.max(0, Math.min(bins.length - 1, idx));
  }

      const startIdx = (Math.random()*SNIPPETS.length)|0;
      for (let off=0; off<SNIPPETS.length; off++){
        const cand = SNIPPETS[(startIdx + off) % SNIPPETS.length];
        if (!inUseTexts.has(cand.t)){ pick = cand; break; }

    // Spout effectively tops out at SPOUT_CEILING_PX above the viewport. Once the pile has
    // grown that high, new flakes keep spawning just above the screen rather than rising
    // ever further into the void — the user always sees fresh activity falling.
    const SPOUT_CEILING_PX = -50;

    const y = spoutY - 30 - Math.random()*60;

      kind, ghost,
      fontObj, fontStr,                  // per-flake typography (stable across all frames)
      k: 0,
      cxSnap,                            // each flake renders against its own snapshot of cxBoard
      prevAnchorX: cxSnap,
      nextAnchorX: cxSnap,
      tStartY: y,
      tEndY:   rowY[0],
      // Lattice anchor offsets (relative to cxBoard) so the lattice can shift mid-fall
      prevAnchorOffX: 0,
      nextAnchorOffX: 0,
      nextRow: 0,
      hue: Math.random(),
      swayPhase: Math.random()*Math.PI*2,
      rotAmp:    ROT_AMP_MIN + Math.random()*(ROT_AMP_MAX-ROT_AMP_MIN),
      rotPeriod: ROT_PERIOD_MIN + Math.random()*(ROT_PERIOD_MAX-ROT_PERIOD_MIN),
      rotPhase:  Math.random()*Math.PI*2,
      rotDir:    Math.random()<0.5 ? -1 : 1,
      birth: performance.now(),
      lastPlink: 0,
      // Pile-physics state
      piling: false,         // true once below the last peg row
      pileBin: -1,
      pileX: 0               // anchored-to-bin x at pile time (won't sway anymore)

  let lastSpawn = 0;
  let nextSpawnIn = SPAWN_MS_MIN;

  function ease(t){
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return 0.5 - 0.5*Math.cos(t*Math.PI);
  }

  // The vertical y at which a flake "rests" when it lands at absolute x = px.
  // Spatial: look across the entire pile for the highest existing glyph within a
  // ~STACK_STEP-wide horizontal neighborhood of px, and rest one stack-step above it.
  // This way the heap accumulates SPATIALLY (cursor sweeps build a wide drift), and
  // committed pile glyphs are never moved or mutated again.
  function restingYFor(px){
    let topY = binBaseY;
    const radius = STACK_STEP * 1.25;
    // Pre-filter by per-bin topY and x range — keeps perf sane as the pile grows huge.
    for (let bi=0; bi<bins.length; bi++){
      const b = bins[bi];
      if (b.topY >= topY) continue;
      if (b.x1 < px - radius - pitch || b.x0 > px + radius + pitch) continue;
      const gs = b.glyphs;
      for (let j=gs.length-1; j>=0; j--){
        const gd = gs[j];
        if (gd.y >= topY) continue;
        if (Math.abs(gd.x - px) <= radius) topY = gd.y;
      }
    }
    return topY - STACK_STEP - (Math.random()*2-1)*STACK_VARIANCE;
  }

  // Highest existing pile y (smallest y value) whose absolute x is in [xMin, xMax].
  // Returns binBaseY when nothing is in the range — i.e. "ground".
  function highestPileYInRange(xMin, xMax){
    let topY = binBaseY;
    for (let bi=0; bi<bins.length; bi++){
      const b = bins[bi];
      if (b.topY >= topY) continue;
      if (b.x1 < xMin || b.x0 > xMax) continue;
      const gs = b.glyphs;
      for (let j=gs.length-1; j>=0; j--){
        const gd = gs[j];
        if (gd.y >= topY) continue;
        if (gd.x >= xMin && gd.x <= xMax) topY = gd.y;
      }
    }
    return topY;
  }

  // ---------- Physics ----------
  function tickPhysics(dt, now){
    // ease cxBoard toward an evolving target. Two modes:
    //   (a) cursor-tracking — normal: target follows cursorX (clamped to viewport).
    //   (b) idle auto-drift  — when the cursor has been still for IDLE_DRIFT_DELAY_MS AND
    //       the pile near the current spout has reached IDLE_DRIFT_TRIGGER_PX from the top,
    //       the spout slowly oscillates across the viewport so the screen fills evenly.
    const halfSpan = (binCount-1) * 0.5 * pitch + pitch * 0.5 + 20;
    const cursorTarget = Math.max(halfSpan, Math.min(innerWidth - halfSpan, cursorX));
    // Pressure-based drift: as the pile under the spout climbs above DRIFT_TRIGGER_PX,
    // the spout starts sliding sideways. At DRIFT_FULL_PX the cursor is mostly overridden.
    const pileTopHere = restingYFor(cxBoard); // y of pile top under current spout
    let driftWeight = 0;
    if (pileTopHere < DRIFT_TRIGGER_PX){
      const range = DRIFT_TRIGGER_PX - DRIFT_FULL_PX;
      const t = (DRIFT_TRIGGER_PX - pileTopHere) / Math.max(1, range);
      driftWeight = Math.max(0, Math.min(1, t));
    }
    let target;
    if (driftWeight > 0){
      // sin-oscillate across the usable width; phase advances on a wall clock so
      // drift keeps moving even as the user wiggles the cursor.
      const phaseSec = now * 0.001;
      const tPhase = Math.sin(phaseSec * (2*Math.PI / DRIFT_PERIOD_S));
      const driftTarget = innerWidth * 0.5 + tPhase * (innerWidth * 0.5 - halfSpan);
      // Mix: at full drift, cursor still contributes DRIFT_CURSOR_BIAS so it isn't dead.
      const cursorMix = (1 - driftWeight) + driftWeight * DRIFT_CURSOR_BIAS;
      target = driftTarget * (1 - cursorMix) + cursorTarget * cursorMix;
    } else {
      target = cursorTarget;
    }
    cxBoard += (target - cxBoard) * CURSOR_TRACK_LERP;
    rebuildBins(); // bins follow lattice

    for (let i=falling.length-1; i>=0; i--){
      const g = falling[i];

      if (g.piling){
        // Free fall in the bin zone at the flake's existing velocity (no gravity).
        g.y += g.vy * dt;
        const b = bins[g.pileBin];
        const restY = restingYFor(g.pileX);

        if (g.y >= restY){
          // Touched the surface. Check left/right neighbor heights for slope.
          g.y = restY;
          const sideR = STACK_STEP * SIDE_PROBE_RADIUS;
          const inner = STACK_STEP * 0.6;
          const leftTopY  = highestPileYInRange(g.pileX - sideR, g.pileX - inner);
          const rightTopY = highestPileYInRange(g.pileX + inner, g.pileX + sideR);
          const slopeT = STACK_STEP * SLOPE_THRESHOLD;

          let slid = false;
          if (rightTopY - leftTopY > slopeT){
            // Right side is lower — slide right
            g.pileX += SLIDE_SPEED * dt;
            g.x = g.pileX;
            slid = true;
          } else if (leftTopY - rightTopY > slopeT){
            // Left side is lower — slide left
            g.pileX -= SLIDE_SPEED * dt;
            g.x = g.pileX;
            slid = true;
          }

          if (slid){
            // Re-evaluate the resting y at the new pileX. If the ground is lower there,
            // let the flake keep falling at its natural vy (continuous physical descent).
            const newRestY = restingYFor(g.pileX);
            if (newRestY > g.y){
              // gentle hand-off: don't snap down; just let g.y march toward newRestY at vy
            } else {
              g.y = newRestY;
            }
            continue;
          }

          // Stable spot — commit to the pile.
          const tSec0 = (now - g.birth) * 0.001;
          const rotNow = Math.sin(tSec0 / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;
          const restRot = rotNow + (Math.random()*2-1) * PILE_REST_ROT;
          b.glyphs.push({
            text: g.text,
            x: g.pileX,
            y: g.y,
            rot: restRot,
            fontStr: g.fontStr,
            fontSize: g.fontObj.size,
            ghost: g.ghost,
            landedAt: now
          });
          if (g.y < b.topY) b.topY = g.y;
          // Free the text immediately so the same snippet can fall again — once a glyph is
          // part of the static pile it's effectively wallpaper, and we want the screen to
          // fill faster than 343 unique strings would otherwise allow.
          inUseTexts.delete(g.text);
          falling.splice(i,1);
        }
        continue;
      }

      // ---- Free fall + lattice transitions ----
      g.y += g.vy * dt;

      // ---- Continuous pile-surface collision (prevents fall-through across all lattice rows) ----
      // The Galton lattice happily lets flakes traverse rowY[r] even when the pile has risen above
      // those rows. Without an extra check, glyphs visibly fall through the heap. So every frame
      // during free-fall we also test against restingYFor(g.x); if we've crossed the surface we
      // commit to the pile at the current x immediately.
      {
        const restY = restingYFor(g.x);
        if (g.y >= restY){
          // figure out which bin's container to push into (spatial, not lattice-index based)
          let bIdx = 0;
          let bestDx = Infinity;
          for (let bi=0; bi<bins.length; bi++){
            const b = bins[bi];
            const cx = (b.x0 + b.x1) * 0.5;
            const dx = Math.abs(cx - g.x);
            if (dx < bestDx){ bestDx = dx; bIdx = bi; }
          }
          const b = bins[bIdx];
          g.pileBin = bIdx;
          g.pileX = g.x;
          g.y = restY;
          // Commit immediately. Don't bother with the seesaw rotation easing here — use the
          // current visual rotation as the resting rotation (no orientation snap).
          const tSec0 = (now - g.birth) * 0.001;
          const rotNow = Math.sin(tSec0 / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;
          const restRot = rotNow + (Math.random()*2-1) * PILE_REST_ROT;
          b.glyphs.push({
            text: g.text,
            x: g.pileX,
            y: g.y,
            rot: restRot,
            fontStr: g.fontStr,
            fontSize: g.fontObj.size,
            ghost: g.ghost,
            landedAt: now
          });
          if (g.y < b.topY) b.topY = g.y;
          inUseTexts.delete(g.text);
          falling.splice(i,1);
          continue;
        }
      }

      while (g.nextRow < ROWS && g.y >= rowY[g.nextRow]){
        g.prevAnchorOffX = g.nextAnchorOffX;
        const dir = Math.random() < 0.5 ? -1 : 1;
        g.k += dir;
        g.nextAnchorOffX = g.k * (pitch * 0.5);
        g.tStartY = rowY[g.nextRow];
        g.tEndY   = (g.nextRow+1 < ROWS) ? rowY[g.nextRow+1] : (rowY[ROWS-1] + rowGap*0.6);
        g.nextRow++;
        if (Math.random() < STEP_NUDGE_PROB && now - g.lastPlink > PLINK_COOLDOWN){
          g.lastPlink = now;
          plink();
        }
      }

      // Continuous interpolated x along current transition, anchored to (live) cxBoard
      const denom = Math.max(0.001, g.tEndY - g.tStartY);
      const tt = ease((g.y - g.tStartY) / denom);
      const offX = g.prevAnchorOffX + (g.nextAnchorOffX - g.prevAnchorOffX) * tt;
      const sway  = Math.sin(now*0.001 * SWAY_FREQ_HZ * Math.PI*2 + g.swayPhase) * SWAY_AMP;
      g.x = g.cxSnap + offX + sway;

      // Once past the last peg row, switch to pile-falling physics
      if (g.nextRow >= ROWS && !g.piling){
        let kFinal = g.k;
        if (kFinal < -ROWS) kFinal = -ROWS;
        if (kFinal >  ROWS) kFinal =  ROWS;
        if (((kFinal + ROWS) & 1) !== 0){
          kFinal += (Math.random()<0.5 ? -1 : 1);
          if (kFinal < -ROWS) kFinal = -ROWS;
          if (kFinal >  ROWS) kFinal =  ROWS;
        }
        // bin center is anchored to the flake's OWN cxSnap so cursor motion never drags in-flight piles
        const cx = g.cxSnap + (kFinal * pitch * 0.5);
        // jitter inside the bin so the pile looks like a junk heap, not a stack
        g.pileX  = cx + (Math.random()-0.5) * (pitch * PILE_X_JITTER);
        g.x      = g.pileX;
        g.pileBin = binIndexFor(g.pileX); // spatial lookup against the fixed viewport grid
        g.piling = true;
      }

      if (g.y > innerHeight + 120 || g.x < -100 || g.x > innerWidth + 100){
        inUseTexts.delete(g.text);
        falling.splice(i,1);
      }
    }

    // Pile is IMMUTABLE once landed — never move, rewrite, or remove a settled glyph.
    // The pile is allowed to grow unboundedly so the photograph is gradually
    // covered by an ever-deepening junk-heap of code and equations. (no-op intentionally.)
  }

  function alphaForFall(now, g){
    let a = Math.min(1, (now - g.birth) / FADE_IN_MS);
    return GLYPH_ALPHA * a;
  }

  function drawFalling(now){
    fctx.globalCompositeOperation = 'destination-out';
    fctx.fillStyle = 'rgba(0,0,0,'+TRAIL_FADE+')';
    fctx.fillRect(0,0,W,H);
    fctx.globalCompositeOperation = 'source-over';

    for (let i=0;i<falling.length;i++){
      const g = falling[i];
      let a = alphaForFall(now, g);
      if (g.ghost) a *= GHOST_ALPHA_MUL;
      if (a <= 0.001) continue;
      const c = samplePhoto(g.x, g.y);
      const tSec = (now - g.birth) * 0.001;
      let rot = Math.sin(tSec / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;
      // While piling, the flake keeps rocking at its natural rate — its landing rotation
      // is captured the moment it lands so there's no rotational snap into the pile.
      fctx.save();
      fctx.translate(g.x, g.y);
      fctx.rotate(rot);
      fctx.font = g.fontStr;
      fctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+a.toFixed(3)+')';
      fctx.fillText(g.text, 0, 0);
      fctx.restore();
    }
  }

  function drawPile(now){
    pctx.clearRect(0,0,W,H);
    for (let i=0;i<bins.length;i++){
      const b = bins[i];
      for (let j=0;j<b.glyphs.length;j++){
        const gd = b.glyphs[j];
        if (gd.y < -20) continue;
        const c = samplePhoto(gd.x, gd.y);
        pctx.save();
        pctx.translate(gd.x, gd.y);
        pctx.rotate(gd.rot);
        pctx.font = gd.fontStr;
        // Just the letters — no rectangular backing. Stroke width scales gently with font size
        // so larger ornamental glyphs read with the same crispness as small monospace ones.
        pctx.lineWidth = Math.max(1.5, gd.fontSize / 7);
        // Pile glyphs render at the SAME alpha as in-flight glyphs — no opacity pop on settling.
        // The pile canvas uses mix-blend-mode: screen, so wherever multiple pile glyphs overlap
        // they additively brighten. Density alone produces the brightening; opacity stays low.
        // Pile fill alpha matches the in-flight alpha exactly. The pile canvas uses
        // mix-blend-mode: lighter so each pile glyph contributes additively — a single glyph
        // is faint, but where many overlap they cumulatively brighten linearly with depth.
        const baseA = gd.ghost ? GLYPH_ALPHA * GHOST_ALPHA_MUL : GLYPH_ALPHA;
        // Soft fade-in over LANDING_FADE_MS so a freshly-landed glyph doesn't pop in.
        const ageMs = gd.landedAt ? (now - gd.landedAt) : LANDING_FADE_MS;
        const tRamp = Math.min(1, Math.max(0, ageMs / LANDING_FADE_MS));
        const eRamp = (1 - Math.cos(tRamp * Math.PI)) * 0.5;
        const pa = baseA * (0.85 + 0.15 * eRamp); // already near full at touchdown; tiny fade-in
        // Subtle dark stroke (photo-sampled fill takes care of color)
        pctx.strokeStyle = 'rgba(0,0,0,' + (pa * 0.55).toFixed(3) + ')';
        pctx.strokeText(gd.text, 0, 0);
        pctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+pa.toFixed(3)+')';
        pctx.fillText(gd.text, 0, 0);
        pctx.restore();
      }
    }
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;
    if (now - lastSpawn >= nextSpawnIn){
      lastSpawn = now;
      nextSpawnIn = SPAWN_MS_MIN + Math.random()*(SPAWN_MS_MAX-SPAWN_MS_MIN);
      spawn();
    }
    tickPhysics(dt, now);
    drawFalling(now);
    drawPile(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
