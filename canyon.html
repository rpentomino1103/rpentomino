<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>canyon</title>
<link rel="icon" href="data:,">
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#fff}
  .bg{
    position:fixed;inset:0;width:100vw;height:100vh;
    object-fit:cover;
    object-position:50% 40%;
    user-select:none;-webkit-user-drag:none;pointer-events:none;
  }
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;
    pointer-events:none;mix-blend-mode:screen}
  nav{position:fixed;left:14px;bottom:12px;z-index:2;
    font-size:11px;letter-spacing:.14em;text-transform:lowercase;
    mix-blend-mode:difference;opacity:.55;user-select:none}
  nav a{color:#fff;text-decoration:none;margin-right:14px;
    border-bottom:1px solid transparent;padding-bottom:1px;
    transition:border-color .25s ease, opacity .25s ease}
  nav a:hover{border-bottom-color:#fff}
  nav a.on{border-bottom-color:#fff;opacity:1}
</style>
</head>
<body>
<img class="bg" src="/photos/canyon.jpg" alt="">
<canvas id="c"></canvas>
<nav>
  <a href="/">redwood</a>
  <a href="/canyon" class="on">canyon</a>
</nav>
<script>
(() => {
  const SPAWN_RATE   = 0.55;
  const MAX_FLAKES   = 220;
  const FALL_MIN     = 18;
  const FALL_MAX     = 42;
  const PEG_ROWS     = 18;
  const KICK_PX      = 6;
  const FLAKE_R_MIN  = 0.6;
  const FLAKE_R_MAX  = 1.8;
  const FLAKE_ALPHA  = 0.55;
  const TRAIL_FADE   = 0.06;
  const PILE_ALPHA   = 0.018;
  const PILE_SIGMA   = 1.6;
  const PILE_DECAY   = 0.0008;
  const PILE_BASE_H  = 6;

  const cvs = document.getElementById('c');
  // willReadFrequently optimizes the getImageData calls in pileSurfaceY
  const ctx = cvs.getContext('2d', { willReadFrequently: true });
  const pile = document.createElement('canvas');
  const pctx = pile.getContext('2d', { willReadFrequently: true });

  let W=0, H=0, DPR=1;
  const flakes = [];

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    
    cvs.width = W * DPR;
    cvs.height = H * DPR;
    pile.width = W * DPR;
    pile.height = H * DPR;
    
    ctx.scale(DPR, DPR);
    pctx.scale(DPR, DPR);
  }

  // Initialize dimensions
  window.addEventListener('resize', resize);
  resize();

  function spawn() {
    if (flakes.length >= MAX_FLAKES) return;
    flakes.push({
      x: W / 2, // Drop exactly from the center for the Galton bell curve
      y: -10,
      vy: FALL_MIN + Math.random() * (FALL_MAX - FALL_MIN),
      r: FLAKE_R_MIN + Math.random() * (FLAKE_R_MAX - FLAKE_R_MIN),
      a: 0.5 + Math.random() * 0.5,
      lastRow: -1 // State lock for discrete kicks
    });
  }

  function pileSurfaceY(x) {
    const px = Math.max(0, Math.min(pile.width - 1, Math.floor(x * DPR)));
    const data = pctx.getImageData(px, 0, 1, pile.height).data;
    for (let y = 0; y < pile.height; y++) {
      if (data[y * 4 + 3] > 40) return y / DPR;
    }
    return H - PILE_BASE_H;
  }

  function depositToPile(x, y, r) {
    const radius = r * PILE_SIGMA * 3;
    const grad = pctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, 'rgba(235,240,255,' + (PILE_ALPHA * 4) + ')');
    grad.addColorStop(1, 'rgba(235,240,255,0)');
    pctx.fillStyle = grad;
    pctx.beginPath();
    pctx.arc(x, y, radius, 0, Math.PI * 2);
    pctx.fill();
  }

  function update(dt) {
    const rowHeight = H / PEG_ROWS;
    
    for (let i = flakes.length - 1; i >= 0; i--) {
      const f = flakes[i];
      // Normalize to ~60fps movement so your fallback variables work perfectly
      f.y += f.vy * dt * 60; 

      const currentRow = Math.floor(f.y / rowHeight);
      
      // Galton Execution: Apply B(n, p) lateral kick exactly once per tier
      if (currentRow > f.lastRow && currentRow < PEG_ROWS) {
        const direction = Math.random() < 0.5 ? -1 : 1;
        f.x += direction * KICK_PX;
        f.lastRow = currentRow;
      }

      // Check collision with the accumulating pile
      const surfaceY = pileSurfaceY(f.x);
      if (f.y + f.r >= surfaceY) {
        depositToPile(f.x, surfaceY, f.r);
        flakes.splice(i, 1);
      }
    }
  }

  function draw() {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,' + TRAIL_FADE + ')';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';

    pctx.globalCompositeOperation = 'destination-out';
    pctx.fillStyle = 'rgba(0,0,0,' + PILE_DECAY + ')';
    pctx.fillRect(0, 0, W, H);
    pctx.globalCompositeOperation = 'source-over';

    for (const f of flakes) {
      ctx.beginPath();
      ctx.fillStyle = 'rgba(240,245,255,' + (FLAKE_ALPHA * f.a) + ')';
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.drawImage(pile, 0, 0, W, H);
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    
    if (Math.random() < SPAWN_RATE) spawn();
    if (Math.random() < SPAWN_RATE) spawn();
    
    update(dt);
    draw();
    
    requestAnimationFrame(loop);
  }
  
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
