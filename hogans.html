<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #fff;
  }
  .bg {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    object-fit: cover; object-position: center;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }
  /* Two stacked canvases: falling flakes (with motion-blur) and the pile (cleared each frame). */
  canvas.layer {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    pointer-events: none; mix-blend-mode: screen;
  }
  canvas#fall { z-index: 9998; }
  canvas#pile { z-index: 9999; mix-blend-mode: normal; }
  h1 { position: absolute; left: -10000px; width: 1px; height: 1px; overflow: hidden; }
</style>

  // ---------- Photo sampler ----------
  const photo = document.getElementById('bgimg');
  const sampler = document.createElement('canvas');
  const sctx = sampler.getContext('2d', { willReadFrequently: true });
  let photoReady = false, photoData = null, photoW = 0, photoH = 0;
  let coverScale = 1, coverDX = 0, coverDY = 0;

  function buildSampler(){
    if (!photo.naturalWidth) return;
    const targetW = 640;
    const ratio = photo.naturalHeight / photo.naturalWidth;
    sampler.width  = targetW;
    sampler.height = Math.round(targetW * ratio);
    sctx.filter = 'blur(' + PHOTO_BLUR_PX + 'px)';
    sctx.drawImage(photo, 0, 0, sampler.width, sampler.height);
    sctx.filter = 'none';
    try {
      photoData = sctx.getImageData(0, 0, sampler.width, sampler.height).data;
      photoW = sampler.width;
      photoH = sampler.height;
      photoReady = true;
    } catch(e) { photoReady = false; }
    updateCoverMapping();
  }
  function updateCoverMapping(){
    if (!photo.naturalWidth) return;
    const iw = photo.naturalWidth, ih = photo.naturalHeight;
    const cw = innerWidth, ch = innerHeight;
    coverScale = Math.max(cw/iw, ch/ih);
    const dw = iw * coverScale, dh = ih * coverScale;
    coverDX = (cw - dw) * 0.5;
    coverDY = (ch - dh) * 0.5;
  }
  if (photo.complete && photo.naturalWidth) buildSampler();
  else photo.addEventListener('load', buildSampler);

  function samplePhoto(sx, sy){
    if (!photoReady) return [200, 210, 225];
    const nx = (sx - coverDX) / coverScale;
    const ny = (sy - coverDY) / coverScale;
    const tx = (nx / photo.naturalWidth) * photoW;
    const ty = (ny / photo.naturalHeight) * photoH;
    const ix = Math.max(0, Math.min(photoW-1, tx | 0));
    const iy = Math.max(0, Math.min(photoH-1, ty | 0));
    const idx = (iy * photoW + ix) * 4;
    let r = photoData[idx], g = photoData[idx+1], b = photoData[idx+2];
    r = Math.min(255, r + 255*PHOTO_LIGHT_BIAS);
    g = Math.min(255, g + 255*PHOTO_LIGHT_BIAS);
    b = Math.min(255, b + 255*PHOTO_LIGHT_BIAS);
    const lum = 0.2126*r + 0.7152*g + 0.0722*b;
    r = lum + (r - lum) * PHOTO_SAT_BOOST;
    g = lum + (g - lum) * PHOTO_SAT_BOOST;
    b = lum + (b - lum) * PHOTO_SAT_BOOST;
    return [r|0, g|0, b|0];
  }

  // ---------- Audio ----------
  let actx = null;
  function ensureAudio(){ if (actx) return; try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  function plink(){
    if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    const f = 520 + Math.random()*420;
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(120, f*0.55), t+0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(PLINK_VOL, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.32);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t+0.36);
  }
  addEventListener('pointerdown', ensureAudio);
  addEventListener('keydown',     ensureAudio);

  // ---------- Cursor tracking ----------
  // The whole peg lattice translates so its center column sits under the cursor.
  let cursorX = innerWidth * 0.5;
  addEventListener('pointermove', (e) => {
    cursorX = e.clientX;
    ensureAudio();
  });

  function buildBoard(){
    cxBoard       = innerWidth * 0.5;
    cxBoardTarget = innerWidth * 0.5;
    topY    = Math.max(80, innerHeight * 0.16);
    binBaseY = innerHeight - 24;
    pitch  = Math.min(PEG_PITCH_PX, (innerWidth - 80) / (ROWS + 2));
    rowGap = Math.min(ROW_GAP_PX, (innerHeight - 240 - topY - 30) / (ROWS + 1));
    rowY = [];
    for (let r=0; r<ROWS; r++) rowY.push(topY + (r+1) * rowGap);
    binCount = ROWS + 1;
    rebuildBins();
  }
  function rebuildBins(){
    binStartX = cxBoard - (binCount-1) * 0.5 * pitch - pitch * 0.5;
    if (!bins.length){
      bins = [];
      for (let i=0; i<binCount; i++){
        const x0 = binStartX + i*pitch;
        bins.push({ x0, x1: x0 + pitch, glyphs: [] });
      }
    } else {
      // shift existing bins horizontally with the lattice
      for (let i=0; i<binCount; i++){
        const x0 = binStartX + i*pitch;
        bins[i].x0 = x0;
        bins[i].x1 = x0 + pitch;
      }
    }
  }
  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = innerWidth; H = innerHeight;
    for (const c of [fall, pile]){
      c.width  = Math.floor(W*dpr);
      c.height = Math.floor(H*dpr);
    }
    for (const cx of [fctx, pctx]){
      cx.setTransform(dpr,0,0,dpr,0,0);
      cx.font = FONT_PX + "px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
      cx.textBaseline = "middle";
      cx.textAlign = "center";
    }
    buildBoard();
    updateCoverMapping();
  }
  resize();
  addEventListener('resize', resize);

  // ---------- Spawning ----------
  function spawn(){
    if (falling.length >= MAX_FALLING) return;
    // Pick a snippet whose text is not currently visible anywhere on screen.
    // Walk SNIPPETS starting from a random offset; first one not in inUseTexts wins.
    // If every snippet is somehow on screen (shouldn't happen with ~200 entries), fall back to random.
    let text = null;
    const startIdx = (Math.random()*SNIPPETS.length)|0;
    for (let off=0; off<SNIPPETS.length; off++){
      const cand = SNIPPETS[(startIdx + off) % SNIPPETS.length];
      if (!inUseTexts.has(cand)){ text = cand; break; }
    }
    if (text === null) text = SNIPPETS[startIdx];
    inUseTexts.add(text);
    const cxSnap = cxBoard;                         // freeze the lattice for this flake
    const x = cxSnap + (Math.random()-0.5)*16;
    const y = topY - 30 - Math.random()*60;
    const vy = FALL_SPEED * (1 + (Math.random()*2-1)*FALL_SPEED_VAR);
    falling.push({
      text, x, y, vy,
      k: 0,
      cxSnap,                            // each flake renders against its own snapshot of cxBoard
      prevAnchorX: cxSnap,
      nextAnchorX: cxSnap,
      tStartY: y,
      tEndY:   rowY[0],
      // Lattice anchor offsets (relative to cxBoard) so the lattice can shift mid-fall
      prevAnchorOffX: 0,
      nextAnchorOffX: 0,
      nextRow: 0,
      hue: Math.random(),
      swayPhase: Math.random()*Math.PI*2,
      rotAmp:    ROT_AMP_MIN + Math.random()*(ROT_AMP_MAX-ROT_AMP_MIN),
      rotPeriod: ROT_PERIOD_MIN + Math.random()*(ROT_PERIOD_MAX-ROT_PERIOD_MIN),
      rotPhase:  Math.random()*Math.PI*2,
      rotDir:    Math.random()<0.5 ? -1 : 1,
      birth: performance.now(),
      lastPlink: 0,
      // Pile-physics state
      piling: false,         // true once below the last peg row
      pileBin: -1,
      pileX: 0               // anchored-to-bin x at pile time (won't sway anymore)
    });
  }
  let lastSpawn = 0;
  let nextSpawnIn = SPAWN_MS_MIN;

  function ease(t){
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return 0.5 - 0.5*Math.cos(t*Math.PI);
  }

  // The vertical y at which a flake "rests" when it lands at absolute x = px.
  // Spatial: look across the entire pile for the highest existing glyph within a
  // ~STACK_STEP-wide horizontal neighborhood of px, and rest one stack-step above it.
  // This way the heap accumulates SPATIALLY (cursor sweeps build a wide drift), and
  // committed pile glyphs are never moved or mutated again.
  function restingYFor(px){
    let topY = binBaseY;
    const radius = STACK_STEP * 1.25;
    for (let bi=0; bi<bins.length; bi++){
      const gs = bins[bi].glyphs;
      for (let j=gs.length-1; j>=0; j--){
        const gd = gs[j];
        if (Math.abs(gd.x - px) <= radius && gd.y < topY){
          topY = gd.y;
        }
      }
    }
    return topY - STACK_STEP - (Math.random()*2-1)*STACK_VARIANCE;
  }

  // Highest existing pile y (smallest y value) whose absolute x is in [xMin, xMax].
  // Returns binBaseY when nothing is in the range — i.e. "ground".
  function highestPileYInRange(xMin, xMax){
    let topY = binBaseY;
    for (let bi=0; bi<bins.length; bi++){
      const gs = bins[bi].glyphs;
      for (let j=gs.length-1; j>=0; j--){
        const gd = gs[j];
        if (gd.x >= xMin && gd.x <= xMax && gd.y < topY) topY = gd.y;
      }
    }
    return topY;
  }

  // ---------- Physics ----------
  function tickPhysics(dt, now){
    // ease cxBoard toward cursor x — clamp so the lattice can't leave the screen
    const halfSpan = (binCount-1) * 0.5 * pitch + pitch * 0.5 + 20;
    const target = Math.max(halfSpan, Math.min(innerWidth - halfSpan, cursorX));
    cxBoard += (target - cxBoard) * CURSOR_TRACK_LERP;
    rebuildBins(); // bins follow lattice

    for (let i=falling.length-1; i>=0; i--){
      const g = falling[i];

      if (g.piling){
        // Free fall in the bin zone at the flake's existing velocity (no gravity).
        g.y += g.vy * dt;
        const b = bins[g.pileBin];
        const restY = restingYFor(g.pileX);

        if (g.y >= restY){
          // Touched the surface. Check left/right neighbor heights for slope.
          g.y = restY;
          const sideR = STACK_STEP * SIDE_PROBE_RADIUS;
          const inner = STACK_STEP * 0.6;
          const leftTopY  = highestPileYInRange(g.pileX - sideR, g.pileX - inner);
          const rightTopY = highestPileYInRange(g.pileX + inner, g.pileX + sideR);
          const slopeT = STACK_STEP * SLOPE_THRESHOLD;

          let slid = false;
          if (rightTopY - leftTopY > slopeT){
            // Right side is lower — slide right
            g.pileX += SLIDE_SPEED * dt;
            g.x = g.pileX;
            slid = true;
          } else if (leftTopY - rightTopY > slopeT){
            // Left side is lower — slide left
            g.pileX -= SLIDE_SPEED * dt;
            g.x = g.pileX;
            slid = true;
          }

          if (slid){
            // Re-evaluate the resting y at the new pileX. If the ground is lower there,
            // let the flake keep falling at its natural vy (continuous physical descent).
            const newRestY = restingYFor(g.pileX);
            if (newRestY > g.y){
              // gentle hand-off: don't snap down; just let g.y march toward newRestY at vy
            } else {
              g.y = newRestY;
            }
            continue;
          }

          // Stable spot — commit to the pile.
          const tSec0 = (now - g.birth) * 0.001;
          const rotNow = Math.sin(tSec0 / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;
          const restRot = rotNow + (Math.random()*2-1) * PILE_REST_ROT;
          b.glyphs.push({
            text: g.text,
            x: g.pileX,
            y: g.y,
            rot: restRot
          });
          falling.splice(i,1);
        }
        continue;
      }

      // ---- Free fall + lattice transitions ----
      g.y += g.vy * dt;

      while (g.nextRow < ROWS && g.y >= rowY[g.nextRow]){
        g.prevAnchorOffX = g.nextAnchorOffX;
        const dir = Math.random() < 0.5 ? -1 : 1;
        g.k += dir;
        g.nextAnchorOffX = g.k * (pitch * 0.5);
        g.tStartY = rowY[g.nextRow];
        g.tEndY   = (g.nextRow+1 < ROWS) ? rowY[g.nextRow+1] : (rowY[ROWS-1] + rowGap*0.6);
        g.nextRow++;
        if (Math.random() < STEP_NUDGE_PROB && now - g.lastPlink > PLINK_COOLDOWN){
          g.lastPlink = now;
          plink();
        }
      }

      // Continuous interpolated x along current transition, anchored to (live) cxBoard
      const denom = Math.max(0.001, g.tEndY - g.tStartY);
      const tt = ease((g.y - g.tStartY) / denom);
      const offX = g.prevAnchorOffX + (g.nextAnchorOffX - g.prevAnchorOffX) * tt;
      const sway  = Math.sin(now*0.001 * SWAY_FREQ_HZ * Math.PI*2 + g.swayPhase) * SWAY_AMP;
      g.x = g.cxSnap + offX + sway;

      // Once past the last peg row, switch to pile-falling physics
      if (g.nextRow >= ROWS && !g.piling){
        let kFinal = g.k;
        if (kFinal < -ROWS) kFinal = -ROWS;
        if (kFinal >  ROWS) kFinal =  ROWS;
        if (((kFinal + ROWS) & 1) !== 0){
          kFinal += (Math.random()<0.5 ? -1 : 1);
          if (kFinal < -ROWS) kFinal = -ROWS;
          if (kFinal >  ROWS) kFinal =  ROWS;
        }
        const bIdx = Math.max(0, Math.min(binCount-1, (kFinal + ROWS) >> 1));
        const b = bins[bIdx];
        // bin center is anchored to the flake's OWN cxSnap so cursor motion never drags in-flight piles
        const cx = g.cxSnap + (kFinal * pitch * 0.5);
        // jitter inside the bin so the pile looks like a junk heap, not a stack
        g.pileX  = cx + (Math.random()-0.5) * (pitch * PILE_X_JITTER);
        g.x      = g.pileX;
        g.pileBin = bIdx;
        g.piling = true;
      }

      if (g.y > innerHeight + 120 || g.x < -100 || g.x > innerWidth + 100){
        inUseTexts.delete(g.text);
        falling.splice(i,1);
      }
    }

    // Pile is IMMUTABLE once landed — never move or rewrite a settled glyph.
    // Glyphs that have piled up past the top of the screen are simply removed (off-screen).
    for (let bi=0; bi<bins.length; bi++){
      const gs = bins[bi].glyphs;
      for (let j=gs.length-1; j>=0; j--){
        if (gs[j].y < -40){
          inUseTexts.delete(gs[j].text);
          gs.splice(j, 1);
        }
      }
    }
  }

  function alphaForFall(now, g){
    let a = Math.min(1, (now - g.birth) / FADE_IN_MS);
    return GLYPH_ALPHA * a;
  }

  function drawFalling(now){
    fctx.globalCompositeOperation = 'destination-out';
    fctx.fillStyle = 'rgba(0,0,0,'+TRAIL_FADE+')';
    fctx.fillRect(0,0,W,H);
    fctx.globalCompositeOperation = 'source-over';

    for (let i=0;i<falling.length;i++){
      const g = falling[i];
      const a = alphaForFall(now, g);
      if (a <= 0.001) continue;
      const c = samplePhoto(g.x, g.y);
      const tSec = (now - g.birth) * 0.001;
      let rot = Math.sin(tSec / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;
      // While piling, the flake keeps rocking at its natural rate — its landing rotation
      // is captured the moment it lands so there's no rotational snap into the pile.
      fctx.save();
      fctx.translate(g.x, g.y);
      fctx.rotate(rot);
      fctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+a.toFixed(3)+')';
      fctx.fillText(g.text, 0, 0);
      fctx.restore();
    }
  }

  function drawPile(now){
    pctx.clearRect(0,0,W,H);
    for (let i=0;i<bins.length;i++){
      const b = bins[i];
      for (let j=0;j<b.glyphs.length;j++){
        const gd = b.glyphs[j];
        if (gd.y < -20) continue;
        const c = samplePhoto(gd.x, gd.y);
        pctx.save();
        pctx.translate(gd.x, gd.y);
        pctx.rotate(gd.rot);
        // Just the letters — no rectangular backing. Dark stroke gives definition against the photo.
        pctx.lineWidth = 2.0;
        pctx.strokeStyle = 'rgba(0,0,0,' + PILE_STROKE_ALPHA.toFixed(3) + ')';
        pctx.strokeText(gd.text, 0, 0);
        // Photo-sampled fill at high alpha — solid-feeling code snippet
        pctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+PILE_ALPHA.toFixed(3)+')';
        pctx.fillText(gd.text, 0, 0);
        pctx.restore();
      }
    }
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;
    if (now - lastSpawn >= nextSpawnIn){
      lastSpawn = now;
      nextSpawnIn = SPAWN_MS_MIN + Math.random()*(SPAWN_MS_MAX-SPAWN_MS_MIN);
      spawn();
    }
    tickPhysics(dt, now);
    drawFalling(now);
    drawPile(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
