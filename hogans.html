<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>hogans</title>
<meta name="description" content="" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 fill=%22%23000%22/></svg>" />
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; overflow: hidden;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #fff;
  }
  .bg {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    object-fit: cover; object-position: center;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }
  canvas#galton {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    pointer-events: none; mix-blend-mode: screen; z-index: 9999;
  }
  h1 { position: absolute; left: -10000px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>
<h1>hogans</h1>
<img class="bg" id="bgimg" src="/photos/hogans.jpg" alt="" crossorigin="anonymous" />
<canvas id="galton"></canvas>
<script>
(()=>{
  // ---------- Tunables ----------
  const GLYPH_ALPHA      = 0.13;   // matches redwood Game of Life PEAK_ALPHA
  const TRAIL_FADE       = 0.05;   // long, soft motion blur
  const ROWS             = 11;     // Galton rows -> 12 bins, Binomial(11, .5)
  const PEG_PITCH_PX     = 44;
  const ROW_GAP_PX       = 50;
  const FALL_SPEED       = 26;     // px/sec — gentle snowfall
  const FALL_SPEED_VAR   = 0.30;   // ±30%
  const SWAY_AMP         = 6;      // px lateral sway (extra to lattice motion)
  const SWAY_FREQ_HZ     = 0.18;   // very slow
  const ROT_AMP_MIN      = 0.10;   // radians (~6°)
  const ROT_AMP_MAX      = 0.18;   // radians (~10°)
  const ROT_PERIOD_MIN   = 3.0;    // seconds
  const ROT_PERIOD_MAX   = 7.0;
  const BIN_HEIGHT       = 240;
  const FONT_PX          = 13;
  const PLINK_VOL        = 0.022;
  const STEP_NUDGE_PROB  = 0.45;
  const PLINK_COOLDOWN   = 110;
  const SPAWN_MS_MIN     = 220;
  const SPAWN_MS_MAX     = 520;
  const MAX_FALLING      = 100;
  const FADE_IN_MS       = 800;    // soft entry from the dark
  // Photo sampling tuning
  const PHOTO_SAT_BOOST  = 0.85;   // <1 desaturates toward grey, matching the photo's palette
  const PHOTO_LIGHT_BIAS = 0.12;   // small lift so the darkest pixels still emit a hint
  const PHOTO_BLUR_PX    = 6;      // average a small neighborhood -> ambient shimmer

  const SNIPPETS = [
    "for(;;){}", "if(x){}", "=>", "fn()", "{...}", "x++",
    "0x1F", "git push", "rm -rf", "01101", "<div/>",
    "let i=0", "[]", "()=>", "true", "false", "NaN",
    "null", "0xCAFE", "y[i]", "&&", "||", "==", "!=",
    "Math.PI", "this.", "new", "await", "async", "yield",
    "fetch()", "JSON", "i++", "++j", "x|0", "&0xff",
    "?:", "1<<8", ">>>", "%%", "/* */", "// !", "#define",
    "$", "@", "0b101", "fn x", "λ", "Σ", "∂",
    "while(1)", "break", "void", "int*", "char[]", "bool",
    "0n", "BigInt", "Promise", "try{}", "catch(e)", "throw",
    "render()", "useFx", "redux", "map()", "reduce", "filter"
  ];

  const cv  = document.getElementById('galton');
  const ctx = cv.getContext('2d');
  let dpr, W, H;

  // Geometry computed in resize()
  let cxBoard, topY, rowY = [], pitch, rowGap;
  let binBaseY, binStartX, binCount;
  let bins = [];

  let falling = [];

  // ---------- Photo sampler (offscreen canvas of the bg image) ----------
  const photo = document.getElementById('bgimg');
  const sampler = document.createElement('canvas');
  const sctx = sampler.getContext('2d', { willReadFrequently: true });
  let photoReady = false, photoData = null, photoW = 0, photoH = 0;
  // We mirror the CSS object-fit:cover mapping so the sampled pixel
  // matches what the user sees behind that screen coordinate.
  let coverScale = 1, coverDX = 0, coverDY = 0;

  function buildSampler(){
    if (!photo.naturalWidth) return;
    // Draw a small, blurred copy for ambient color sampling
    const targetW = 640;
    const ratio = photo.naturalHeight / photo.naturalWidth;
    sampler.width  = targetW;
    sampler.height = Math.round(targetW * ratio);
    sctx.filter = 'blur(' + PHOTO_BLUR_PX + 'px)';
    sctx.drawImage(photo, 0, 0, sampler.width, sampler.height);
    sctx.filter = 'none';
    photoData = sctx.getImageData(0, 0, sampler.width, sampler.height).data;
    photoW = sampler.width;
    photoH = sampler.height;
    photoReady = true;
    updateCoverMapping();
  }
  function updateCoverMapping(){
    if (!photo.naturalWidth) return;
    const iw = photo.naturalWidth, ih = photo.naturalHeight;
    const cw = innerWidth, ch = innerHeight;
    // object-fit:cover: scale so image covers viewport
    coverScale = Math.max(cw/iw, ch/ih);
    const dw = iw * coverScale, dh = ih * coverScale;
    coverDX = (cw - dw) * 0.5;
    coverDY = (ch - dh) * 0.5;
  }
  if (photo.complete && photo.naturalWidth) buildSampler();
  else photo.addEventListener('load', buildSampler);

  // Sample the photo at viewport coordinate (sx, sy) and return r,g,b
  function samplePhoto(sx, sy){
    if (!photoReady) return [200, 210, 225];
    // viewport -> natural image coords (account for object-fit:cover)
    const nx = (sx - coverDX) / coverScale;
    const ny = (sy - coverDY) / coverScale;
    // natural -> sampler coords
    const tx = (nx / photo.naturalWidth) * photoW;
    const ty = (ny / photo.naturalHeight) * photoH;
    const ix = Math.max(0, Math.min(photoW-1, tx | 0));
    const iy = Math.max(0, Math.min(photoH-1, ty | 0));
    const idx = (iy * photoW + ix) * 4;
    let r = photoData[idx], g = photoData[idx+1], b = photoData[idx+2];

    // small lightness lift so very dark areas still emit something
    r = Math.min(255, r + 255*PHOTO_LIGHT_BIAS);
    g = Math.min(255, g + 255*PHOTO_LIGHT_BIAS);
    b = Math.min(255, b + 255*PHOTO_LIGHT_BIAS);

    // desaturate toward the photo's near-monochrome palette
    const lum = 0.2126*r + 0.7152*g + 0.0722*b;
    r = lum + (r - lum) * PHOTO_SAT_BOOST;
    g = lum + (g - lum) * PHOTO_SAT_BOOST;
    b = lum + (b - lum) * PHOTO_SAT_BOOST;

    return [r|0, g|0, b|0];
  }

  // ---------- Audio ----------
  let actx = null;
  function ensureAudio(){ if (actx) return; try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  function plink(){
    if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    const f = 520 + Math.random()*420;
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(120, f*0.55), t+0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(PLINK_VOL, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.32);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t+0.36);
  }
  addEventListener('pointerdown', ensureAudio);
  addEventListener('keydown',     ensureAudio);

  // ---------- Layout ----------
  function buildBoard(){
    cxBoard = innerWidth * 0.5;
    topY    = Math.max(80, innerHeight * 0.16);
    binBaseY = innerHeight - 24;
    pitch  = Math.min(PEG_PITCH_PX, (innerWidth - 80) / (ROWS + 2));
    rowGap = Math.min(ROW_GAP_PX, (innerHeight - BIN_HEIGHT - topY - 30) / (ROWS + 1));
    rowY = [];
    for (let r=0; r<ROWS; r++) rowY.push(topY + (r+1) * rowGap);
    binCount = ROWS + 1;
    binStartX = cxBoard - (binCount-1) * 0.5 * pitch - pitch * 0.5;
    bins = [];
    for (let i=0; i<binCount; i++){
      const x0 = binStartX + i*pitch;
      bins.push({ x0, x1: x0 + pitch, glyphs: [] });
    }
  }
  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = innerWidth; H = innerHeight;
    cv.width  = Math.floor(W*dpr);
    cv.height = Math.floor(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.font = FONT_PX + "px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace";
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";
    buildBoard();
    updateCoverMapping();
  }
  resize();
  addEventListener('resize', resize);

  // ---------- Spawn ----------
  // Each flake holds:
  //   text, hue, vy, birth
  //   k: integer step count so far (lattice)
  //   prevAnchorX, nextAnchorX: continuous interpolation endpoints
  //   tStart, tEnd (ms): time window of current row transition
  //   nextRow: index of the next peg row to traverse
  //   swayPhase, rotAmp, rotPeriod, rotPhase
  function spawn(){
    if (falling.length >= MAX_FALLING) return;
    const text = SNIPPETS[(Math.random()*SNIPPETS.length)|0];
    const x = cxBoard + (Math.random()-0.5)*16;
    const y = topY - 30 - Math.random()*60;
    const vy = FALL_SPEED * (1 + (Math.random()*2-1)*FALL_SPEED_VAR);
    falling.push({
      text,
      x, y,
      vy,
      k: 0,
      prevAnchorX: cxBoard,
      nextAnchorX: cxBoard,
      // The first transition spans from spawn-y to rowY[0]
      tStartY: y,
      tEndY:   rowY[0],
      nextRow: 0,
      hue: Math.random(),
      swayPhase: Math.random()*Math.PI*2,
      rotAmp:    ROT_AMP_MIN + Math.random()*(ROT_AMP_MAX-ROT_AMP_MIN),
      rotPeriod: ROT_PERIOD_MIN + Math.random()*(ROT_PERIOD_MAX-ROT_PERIOD_MIN),
      rotPhase:  Math.random()*Math.PI*2,
      rotDir:    Math.random()<0.5 ? -1 : 1,
      birth: performance.now(),
      lastPlink: 0
    });
  }
  let lastSpawn = 0;
  let nextSpawnIn = SPAWN_MS_MIN;

  // smoothstep-like easing
  function ease(t){
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return 0.5 - 0.5*Math.cos(t*Math.PI);
  }

  // ---------- Physics ----------
  function tickPhysics(dt, now){
    for (let i=falling.length-1; i>=0; i--){
      const g = falling[i];
      g.y += g.vy * dt;

      // When y crosses the next peg row, commit a coin flip and start a new transition
      while (g.nextRow < ROWS && g.y >= rowY[g.nextRow]){
        // commit current target (we are deemed to have arrived at nextAnchorX at this row)
        g.prevAnchorX = g.nextAnchorX;
        // make a new fair coin step
        const dir = Math.random() < 0.5 ? -1 : 1;
        g.k += dir;
        g.nextAnchorX = cxBoard + g.k * (pitch * 0.5);
        // The new transition spans this peg row to the next (or to bin baseline)
        g.tStartY = rowY[g.nextRow];
        g.tEndY   = (g.nextRow+1 < ROWS) ? rowY[g.nextRow+1] : (binBaseY - 6);
        g.nextRow++;
        // sparse plink
        if (Math.random() < STEP_NUDGE_PROB && now - g.lastPlink > PLINK_COOLDOWN){
          g.lastPlink = now;
          plink();
        }
      }

      // continuous interpolated x along the current transition
      const denom = Math.max(0.001, g.tEndY - g.tStartY);
      const t = ease((g.y - g.tStartY) / denom);
      const baseX = g.prevAnchorX + (g.nextAnchorX - g.prevAnchorX) * t;
      const sway  = Math.sin(now*0.001 * SWAY_FREQ_HZ * Math.PI*2 + g.swayPhase) * SWAY_AMP;
      g.x = baseX + sway;

      // landed
      if (g.y >= binBaseY - 6){
        let kFinal = g.k;
        if (kFinal < -ROWS) kFinal = -ROWS;
        if (kFinal >  ROWS) kFinal =  ROWS;
        if (((kFinal + ROWS) & 1) !== 0){
          kFinal += (Math.random()<0.5 ? -1 : 1);
          if (kFinal < -ROWS) kFinal = -ROWS;
          if (kFinal >  ROWS) kFinal =  ROWS;
        }
        const bIdx = Math.max(0, Math.min(binCount-1, (kFinal + ROWS) >> 1));
        const b = bins[bIdx];
        b.glyphs.push({
          text: g.text,
          hue:  g.hue,
          xJit: (Math.random()-0.5) * (pitch*0.55)
        });
        falling.splice(i,1);
        continue;
      }

      if (g.y > innerHeight + 40 || g.x < -80 || g.x > innerWidth + 80){
        falling.splice(i,1);
      }
    }
  }

  // ---------- Render ----------
  function alphaForFall(now, g){
    // soft fade-in only; constant alpha after that
    const lifeIn = Math.min(1, (now - g.birth) / FADE_IN_MS);
    return GLYPH_ALPHA * lifeIn;
  }

  function colorAt(sx, sy){
    return samplePhoto(sx, sy);
  }

  function draw(now){
    // long, soft trail = motion blur
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,'+TRAIL_FADE+')';
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation = 'source-over';

    // Falling glyphs with rotational seesaw
    for (let i=0;i<falling.length;i++){
      const g = falling[i];
      const a = alphaForFall(now, g);
      if (a <= 0.001) continue;

      // photo-sampled color at this position
      const c = colorAt(g.x, g.y);

      // seesaw rotation: sin(2π t / period + phase) * amp * dir
      const tSec = (now - g.birth) * 0.001;
      const rot = Math.sin(tSec / g.rotPeriod * Math.PI*2 + g.rotPhase) * g.rotAmp * g.rotDir;

      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(rot);
      ctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+a.toFixed(3)+')';
      ctx.fillText(g.text, 0, 0);
      ctx.restore();
    }

    // Pile glyphs — same alpha cap as falling glyphs (no boost, no glow)
    for (let i=0;i<bins.length;i++){
      const b = bins[i];
      const cx = (b.x0 + b.x1) * 0.5;
      for (let j=0;j<b.glyphs.length;j++){
        const gd = b.glyphs[j];
        const gy = binBaseY - j*(FONT_PX+1);
        if (gy < 0) break;
        const px = cx + gd.xJit*0.5;
        const c = colorAt(px, gy);
        ctx.fillStyle = 'rgba('+c[0]+','+c[1]+','+c[2]+','+GLYPH_ALPHA.toFixed(3)+')';
        ctx.fillText(gd.text, px, gy);
      }
    }
    // (no baseline glow — keeps the pile at the same translucence as the fall)
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;
    if (now - lastSpawn >= nextSpawnIn){
      lastSpawn = now;
      nextSpawnIn = SPAWN_MS_MIN + Math.random()*(SPAWN_MS_MAX-SPAWN_MS_MIN);
      spawn();
    }
    tickPhysics(dt, now);
    draw(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
