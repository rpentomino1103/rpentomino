<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>canyon</title>
<link rel="icon" href="data:,">
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#fff}
  .bg{
    position:fixed;inset:0;width:100vw;height:100vh;
    object-fit:cover;
    object-position:50% 40%;
    user-select:none;-webkit-user-drag:none;pointer-events:none;
  }
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;
    pointer-events:none;mix-blend-mode:screen}
  nav{position:fixed;left:14px;bottom:12px;z-index:2;
    font-size:11px;letter-spacing:.14em;text-transform:lowercase;
    mix-blend-mode:difference;opacity:.55;user-select:none}
  nav a{color:#fff;text-decoration:none;margin-right:14px;
    border-bottom:1px solid transparent;padding-bottom:1px;
    transition:border-color .25s ease, opacity .25s ease}
  nav a:hover{border-bottom-color:#fff}
  nav a.on{border-bottom-color:#fff;opacity:1}
</style>
</head>
<body>
<img class="bg" src="/photos/canyon.jpg" alt="">
<canvas id="c"></canvas>
<nav>
  <a href="/">redwood</a>
  <a href="/canyon" class="on">canyon</a>
</nav>
<script>
(() => {
  // --- KINETIC & VISUAL PARAMETERS ---

  const SPAWN_RATE   = 0.15; // Extremely sparse
  const MAX_FLAKES   = 150;  
  
  // Nigh-suspended vertical drift
  const FALL_MIN     = 0.4;  
  const FALL_MAX     = 1.2;  
  
  // Galton width & granularity
  const KICK_PX      = 180; 
  const PEG_ROWS     = 42;   // Increased for smoother, finer branching

  const FLAKE_R_MIN  = 1.5;
  const FLAKE_R_MAX  = 4.5;
  
  // Pushed to the very edge of visibility
  const TRAIL_FADE   = 0.01; 
  const PILE_DECAY   = 0.006; 
  const MELT_RATE    = 0.03;
  
  const COLOR_FREQ_T = 0.00012;
  // Canyon-mapped palette: Sunlit sandstone shifting to deep terracotta
  const WARM = [255, 185, 110]; 
  const COOL = [210, 85, 45];   

  // --- STATE TRACKING ---

  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  const pile = document.createElement('canvas');
  const pctx = pile.getContext('2d');

  let W=0, H=0, DPR=1;
  let surfaceHeights = new Float32Array(0);
  const flakes = [];
  
  // Track cursor for dynamic Galton origin
  let targetX = window.innerWidth / 2;
  window.addEventListener('mousemove', (e) => targetX = e.clientX);
  window.addEventListener('touchstart', (e) => targetX = e.touches[0].clientX);
  window.addEventListener('touchmove', (e) => targetX = e.touches[0].clientX);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    if (!targetX) targetX = W / 2; // Safety fallback
    
    cvs.width = W * DPR;
    cvs.height = H * DPR;
    pile.width = W * DPR;
    pile.height = H * DPR;
    
    ctx.scale(DPR, DPR);
    pctx.scale(DPR, DPR);

    const oldHeights = surfaceHeights;
    surfaceHeights = new Float32Array(W);
    for(let i = 0; i < W; i++) {
       surfaceHeights[i] = (i < oldHeights.length) ? Math.min(oldHeights[i], H - 10) : H - 10;
    }
  }
  window.addEventListener('resize', resize);
  resize();

  function lerp(a, b, t) { return a + (b - a) * t; }
  
  function colorAt(now) {
    const m = 0.5 + 0.5 * Math.sin(now * COLOR_FREQ_T * 6.283);
    const r = Math.round(lerp(WARM[0], COOL[0], m));
    const g = Math.round(lerp(WARM[1], COOL[1], m));
    const b = Math.round(lerp(WARM[2], COOL[2], m));
    return `${r},${g},${b}`;
  }

  function spawn() {
    if (flakes.length >= MAX_FLAKES) return;
    flakes.push({
      x: targetX, // Particles now drop dynamically from your cursor's X axis
      y: -10,
      vy: FALL_MIN + Math.random() * (FALL_MAX - FALL_MIN),
      r: FLAKE_R_MIN + Math.random() * (FLAKE_R_MAX - FLAKE_R_MIN),
      lastRow: -1
    });
  }

  function depositToPile(x, y, r, rgb) {
    const radius = r * 5; 
    const grad = pctx.createRadialGradient(x, y, 0, x, y, radius);
    // Barely perceivable base accumulation
    grad.addColorStop(0, `rgba(${rgb}, 0.002)`); 
    grad.addColorStop(1, `rgba(${rgb}, 0)`);
    pctx.fillStyle = grad;
    pctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);

    const spread = Math.floor(r * 2.5);
    for (let i = -spread; i <= spread; i++) {
      const ix = Math.floor(x) + i;
      if (ix >= 0 && ix < W) {
        const drop = (r * 0.15) * Math.exp(-(i * i) / (spread * spread / 4));
        surfaceHeights[ix] = Math.max(0, surfaceHeights[ix] - drop);
      }
    }
  }

  function update(dt, now) {
    const rowHeight = H / PEG_ROWS;
    const rgb = colorAt(now);

    for (let i = 0; i < W; i++) {
      if (surfaceHeights[i] < H - 10) {
        surfaceHeights[i] = Math.min(H - 10, surfaceHeights[i] + MELT_RATE * dt * 60);
      }
    }
    
    for (let i = flakes.length - 1; i >= 0; i--) {
      const f = flakes[i];
      f.y += f.vy * dt * 60; 

      const currentRow = Math.floor(f.y / rowHeight);
      
      if (currentRow > f.lastRow && currentRow < PEG_ROWS) {
        const direction = Math.random() < 0.5 ? -1 : 1;
        f.x += direction * KICK_PX; 
        f.lastRow = currentRow;
      }

      const ix = Math.max(0, Math.min(W - 1, Math.floor(f.x)));
      const surfaceY = surfaceHeights[ix];
      
      if (f.y + f.r >= surfaceY) {
        depositToPile(f.x, surfaceY, f.r, rgb);
        flakes.splice(i, 1);
      }
    }
  }

  function draw(now) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = `rgba(0,0,0,${TRAIL_FADE})`;
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';

    pctx.globalCompositeOperation = 'destination-out';
    pctx.fillStyle = `rgba(0,0,0,${PILE_DECAY})`;
    pctx.fillRect(0, 0, W, H);
    pctx.globalCompositeOperation = 'source-over';

    const rgb = colorAt(now);

    for (const f of flakes) {
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 2);
      // Ghostly translucency for the descending particles
      grad.addColorStop(0, `rgba(${rgb}, 0.02)`);  
      grad.addColorStop(0.3, `rgba(${rgb}, 0.005)`); 
      grad.addColorStop(1, `rgba(${rgb}, 0)`);
      
      // We switch to 'lighter' blend mode here to give them an incandescent, dust-mote glow 
      // without artificially increasing their raw alpha.
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = grad;
      ctx.fillRect(f.x - f.r * 2, f.y - f.r * 2, f.r * 4, f.r * 4);
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.drawImage(pile, 0, 0, W, H);
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    
    if (Math.random() < SPAWN_RATE) spawn();
    
    update(dt, now);
    draw(now);
    
    requestAnimationFrame(loop);
  }
  
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
